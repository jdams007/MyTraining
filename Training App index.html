<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Training" />
  <title>Training · Jan Dams</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* HEADER */
    #app-header {
      padding: 20px 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #151515;
    }
    #app-title { font-size: 22px; font-weight: 700; letter-spacing: 4px; }
    #app-sub { font-size: 11px; color: #444; letter-spacing: 2px; }

    /* TAB BAR */
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: #0d0d0d;
      border-top: 1px solid #151515;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .tab-btn {
      background: none;
      border: none;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      padding: 4px 16px;
      color: #555;
      transition: color 0.2s;
    }
    .tab-btn.active { color: #e8c547; }

    /* HOME */
    #home-view { padding: 20px 16px; }
    .section-label { font-size: 10px; color: #444; letter-spacing: 3px; margin-bottom: 12px; }
    .day-grid { display: flex; flex-direction: column; gap: 8px; }
    .day-card {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      text-align: left;
      padding: 0;
      width: 100%;
    }
    .day-accent { width: 4px; flex-shrink: 0; }
    .day-card-inner { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; flex: 1; }
    .day-card-label { font-size: 15px; font-weight: 600; color: #ddd; }
    .day-pct { font-size: 13px; font-weight: 700; }

    /* WORKOUT VIEW */
    #workout-view { padding: 16px; display: none; }
    .workout-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .back-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 0; }
    .day-title { font-size: 16px; font-weight: 700; }
    .date-str { font-size: 11px; color: #444; margin-top: 2px; }
    .progress-badge { font-size: 13px; color: #666; }
    .progress-bar { height: 2px; background: #1a1a1a; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .exercise-list { display: flex; flex-direction: column; gap: 10px; }
    .ex-card { background: #111; border: 1px solid #1a1a1a; border-radius: 10px; padding: 14px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .ex-name { font-size: 13px; font-weight: 600; color: #ccc; flex: 1; }
    .sets-tag { font-size: 10px; color: #444; letter-spacing: 1px; margin-left: 8px; }
    .sets-grid { display: flex; flex-direction: column; gap: 6px; }
    .set-row { display: flex; align-items: center; gap: 8px; }
    .set-label { font-size: 11px; color: #444; width: 20px; flex-shrink: 0; }
    .set-input {
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      padding: 6px 8px;
      width: 70px;
      outline: none;
      text-align: center;
    }
    .set-input.narrow { width: 60px; }
    .unit { font-size: 11px; color: #444; }
    .note-input {
      margin-top: 10px;
      background: transparent;
      border: none;
      border-top: 1px solid #1a1a1a;
      color: #555;
      font-size: 12px;
      padding: 8px 0 0;
      width: 100%;
      outline: none;
      font-family: inherit;
    }

    /* HISTORY */
    #history-view { padding: 16px; display: none; flex-direction: column; gap: 8px; }
    .history-card { background: #111; border: 1px solid #1a1a1a; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .history-day { font-size: 13px; font-weight: 600; color: #ccc; }
    .history-date { font-size: 11px; color: #444; margin-top: 2px; }
    .history-pct { margin-left: auto; font-size: 14px; font-weight: 700; }

    /* STATS */
    #stats-view { padding: 16px; display: none; }
    .stats-title { font-size: 10px; color: #444; letter-spacing: 3px; margin-bottom: 16px; }
    .ex-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .ex-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 11px;
      cursor: pointer;
      color: #888;
      transition: all 0.2s;
      font-family: inherit;
    }
    .ex-btn.active { color: var(--ex-color); border-color: var(--ex-color); }
    .chart-box { background: #111; border: 1px solid #1a1a1a; border-radius: 10px; padding: 16px; }
    .chart-title { font-size: 12px; color: #888; margin-bottom: 12px; }
    canvas#chart { width: 100% !important; }
    .empty-msg { padding: 40px; text-align: center; color: #333; font-size: 13px; }
  </style>
</head>
<body>

<div id="app-header">
  <span id="app-title">TRAINING</span>
  <span id="app-sub">Jan Dams</span>
</div>

<!-- HOME -->
<div id="home-view">
  <div class="section-label">PROGRAMM</div>
  <div class="day-grid" id="day-grid"></div>
</div>

<!-- WORKOUT -->
<div id="workout-view">
  <div class="workout-header">
    <button class="back-btn" id="back-btn">← Zurück</button>
    <div>
      <div class="day-title" id="workout-title"></div>
      <div class="date-str" id="workout-date"></div>
    </div>
    <div class="progress-badge" id="progress-badge"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="exercise-list" id="exercise-list"></div>
</div>

<!-- HISTORY -->
<div id="history-view"></div>

<!-- STATS -->
<div id="stats-view">
  <div class="stats-title">FORTSCHRITT</div>
  <div class="ex-selector" id="ex-selector"></div>
  <div class="chart-box" id="chart-box" style="display:none">
    <div class="chart-title" id="chart-title"></div>
    <canvas id="chart" height="180"></canvas>
  </div>
  <div class="empty-msg" id="stats-empty"></div>
</div>

<!-- TAB BAR -->
<div id="tab-bar">
  <button class="tab-btn active" data-tab="home">Training</button>
  <button class="tab-btn" data-tab="history">Verlauf</button>
  <button class="tab-btn" data-tab="stats">Statistik</button>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const PROGRAMS = {
  monday: {
    label: "Mo – Pull", fullLabel: "Montag · Pull · Calisthenics", color: "#e8c547",
    exercises: [
      { id: "fl-holds", name: "Front Lever Holds (Ringe)", sets: 5, type: "time" },
      { id: "tfl-pullups", name: "Tuck FL Pullups (Ringe)", sets: 4, type: "reps" },
      { id: "neg-mu", name: "Negative Muscle-ups", sets: 4, type: "reps" },
      { id: "mu-swing", name: "Muscle-ups (Schwung)", sets: 4, type: "reps" },
      { id: "c2b", name: "Chest to Bar Pull-ups", sets: 5, type: "reps" },
      { id: "w-pullups", name: "Weighted Pull-ups", sets: 5, type: "weighted" },
      { id: "pullups", name: "Pull-ups", sets: 3, type: "reps" },
    ]
  },
  tuesday: {
    label: "Di – Kraft", fullLabel: "Dienstag · Kraft", color: "#e87c47",
    exercises: [
      { id: "kb-swing-tue", name: "Kettlebell Swings", sets: 10, type: "weighted" },
      { id: "squat", name: "Squats (Langhantel)", sets: 5, type: "weighted" },
      { id: "deadlift", name: "Deadlifts (Langhantel)", sets: 4, type: "weighted" },
      { id: "shoulder-press", name: "Shoulder Press (LH)", sets: 4, type: "weighted" },
      { id: "hip-thrust", name: "Hip Thrusts", sets: 3, type: "weighted" },
      { id: "high-rows", name: "High Rows", sets: 5, type: "weighted" },
      { id: "bench", name: "Bench Press (LH)", sets: 5, type: "weighted" },
      { id: "curls", name: "Bizeps Curls", sets: 5, type: "weighted" },
    ]
  },
  wednesday: {
    label: "Mi – Push", fullLabel: "Mittwoch · Push · Calisthenics", color: "#47e8c5",
    exercises: [
      { id: "wall-hs-scap", name: "Wall HS Scapula Pushups", sets: 3, type: "reps" },
      { id: "free-hs", name: "Freier Handstand", sets: 5, type: "time" },
      { id: "rdm-planche", name: "Ring Dream Machine Planche", sets: 5, type: "time" },
      { id: "ring-pushups", name: "Ring Pushups", sets: 4, type: "reps" },
      { id: "dips", name: "Dips (Ringe)", sets: 4, type: "reps" },
      { id: "hs-pushups", name: "Handstand Pushups", sets: 4, type: "reps" },
      { id: "pike-pushups", name: "Pike Pushups", sets: 3, type: "reps" },
    ]
  },
  thursday: {
    label: "Do – Kraft", fullLabel: "Donnerstag · Kraft", color: "#a047e8",
    exercises: [
      { id: "kb-swing-thu", name: "Kettlebell Swings", sets: 10, type: "weighted" },
      { id: "th-squat", name: "Squats (Langhantel)", sets: 5, type: "weighted" },
      { id: "rdl", name: "Romanian Deadlifts", sets: 4, type: "weighted" },
      { id: "lunges", name: "Lunges", sets: 3, type: "weighted" },
      { id: "leg-curl", name: "Leg Curl (Maschine)", sets: 4, type: "weighted" },
      { id: "calf-raises", name: "Calf Raises", sets: 4, type: "weighted" },
      { id: "ab-wheel", name: "Ab Wheel", sets: 3, type: "reps" },
      { id: "hanging-leg", name: "Hanging Leg Raises", sets: 3, type: "reps" },
    ]
  },
  friday: {
    label: "Fr – Pull", fullLabel: "Freitag · Pull · Calisthenics", color: "#47a0e8",
    exercises: [
      { id: "fl-holds-fri", name: "Front Lever Holds (Ringe)", sets: 5, type: "time" },
      { id: "tfl-rows", name: "Tuck FL Rows", sets: 4, type: "reps" },
      { id: "archer-pullups", name: "Archer Pull-ups", sets: 4, type: "reps" },
      { id: "l-sit-pullups", name: "L-Sit Pull-ups", sets: 4, type: "reps" },
      { id: "ring-rows", name: "Ring Rows", sets: 4, type: "reps" },
      { id: "w-pullups-fri", name: "Weighted Pull-ups", sets: 5, type: "weighted" },
      { id: "pullups-fri", name: "Pull-ups", sets: 3, type: "reps" },
    ]
  },
};

const DAYS = ["monday","tuesday","wednesday","thursday","friday"];
const STORAGE_KEY = "jan_training_log";

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; }
}
function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}
function todayStr() { return new Date().toISOString().split("T")[0]; }
function sessionKey(day) { return `${day}::${todayStr()}`; }

let allData = loadData();
let currentTab = "home";
let currentDay = null;
let chartInstance = null;
let selectedExId = null;

// ─── TAB NAVIGATION ──────────────────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => showTab(btn.dataset.tab));
});

function showTab(tab) {
  currentTab = tab;
  currentDay = null;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("home-view").style.display = tab === "home" ? "block" : "none";
  document.getElementById("workout-view").style.display = "none";
  document.getElementById("history-view").style.display = tab === "history" ? "flex" : "none";
  document.getElementById("stats-view").style.display = tab === "stats" ? "block" : "none";
  if (tab === "home") renderHome();
  if (tab === "history") renderHistory();
  if (tab === "stats") renderStats();
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function renderHome() {
  const grid = document.getElementById("day-grid");
  grid.innerHTML = "";
  DAYS.forEach(day => {
    const prog = PROGRAMS[day];
    const sk = sessionKey(day);
    const session = allData[sk] || {};
    const total = prog.exercises.reduce((a, e) => a + e.sets, 0);
    const done = prog.exercises.reduce((acc, ex) => {
      const s = (session[ex.id]?.sets || []);
      return acc + s.filter(x => x && (x.reps || x.time || x.kg)).length;
    }, 0);
    const pct = done > 0 ? Math.round((done/total)*100) : 0;

    const btn = document.createElement("button");
    btn.className = "day-card";
    btn.innerHTML = `
      <div class="day-accent" style="background:${prog.color}"></div>
      <div class="day-card-inner">
        <div class="day-card-label">${prog.label}</div>
        ${done > 0 ? `<div class="day-pct" style="color:${prog.color}">${pct}%</div>` : ""}
      </div>`;
    btn.addEventListener("click", () => openWorkout(day));
    grid.appendChild(btn);
  });
}

// ─── WORKOUT ──────────────────────────────────────────────────────────────────
function openWorkout(day) {
  currentDay = day;
  document.getElementById("home-view").style.display = "none";
  document.getElementById("workout-view").style.display = "block";
  renderWorkout();
}

document.getElementById("back-btn").addEventListener("click", () => {
  showTab("home");
});

function renderWorkout() {
  const day = currentDay;
  const prog = PROGRAMS[day];
  const sk = sessionKey(day);
  const session = allData[sk] || {};

  document.getElementById("workout-title").textContent = prog.fullLabel;
  document.getElementById("workout-title").style.color = prog.color;
  document.getElementById("workout-date").textContent = todayStr();

  const total = prog.exercises.reduce((a, e) => a + e.sets, 0);

  function updateProgress() {
    const s = allData[sk] || {};
    const done = prog.exercises.reduce((acc, ex) => {
      const sets = (s[ex.id]?.sets || []);
      return acc + sets.filter(x => x && (x.reps || x.time || x.kg)).length;
    }, 0);
    document.getElementById("progress-badge").innerHTML = `<span style="color:${prog.color}">${done}</span>/${total}`;
    document.getElementById("progress-fill").style.width = `${(done/total)*100}%`;
    document.getElementById("progress-fill").style.background = prog.color;
  }

  const list = document.getElementById("exercise-list");
  list.innerHTML = "";

  prog.exercises.forEach(ex => {
    const card = document.createElement("div");
    card.className = "ex-card";
    card.innerHTML = `
      <div class="card-header">
        <span class="ex-name">${ex.name}</span>
        <span class="sets-tag">${ex.sets} SÄTZE</span>
      </div>
      <div class="sets-grid" id="sets-${ex.id}"></div>
      <input class="note-input" placeholder="Notiz..." id="note-${ex.id}" value="" />
    `;
    list.appendChild(card);

    const setsGrid = card.querySelector(`#sets-${ex.id}`);
    const noteInput = card.querySelector(`#note-${ex.id}`);

    const exData = (allData[sk] || {})[ex.id] || {};
    noteInput.value = exData.note || "";

    noteInput.addEventListener("input", () => {
      ensureSession(sk);
      if (!allData[sk][ex.id]) allData[sk][ex.id] = { sets: [], note: "" };
      allData[sk][ex.id].note = noteInput.value;
      saveData(allData);
    });

    for (let i = 0; i < ex.sets; i++) {
      const row = document.createElement("div");
      row.className = "set-row";
      const saved = exData.sets?.[i] || {};

      if (ex.type === "reps") {
        row.innerHTML = `
          <span class="set-label">S${i+1}</span>
          <input class="set-input" type="number" inputmode="numeric" placeholder="Wdh." value="${saved.reps||""}" />
        `;
        row.querySelector("input").addEventListener("input", e => {
          saveSet(sk, ex.id, i, { reps: e.target.value }, ex.sets);
          updateProgress();
        });
      } else if (ex.type === "time") {
        row.innerHTML = `
          <span class="set-label">S${i+1}</span>
          <input class="set-input" type="number" inputmode="numeric" placeholder="Sek." value="${saved.time||""}" />
          <span class="unit">s</span>
        `;
        row.querySelector("input").addEventListener("input", e => {
          saveSet(sk, ex.id, i, { time: e.target.value }, ex.sets);
          updateProgress();
        });
      } else if (ex.type === "weighted") {
        row.innerHTML = `
          <span class="set-label">S${i+1}</span>
          <input class="set-input narrow" type="number" inputmode="decimal" placeholder="kg" value="${saved.kg||""}" data-field="kg" />
          <span class="unit">kg</span>
          <input class="set-input narrow" type="number" inputmode="numeric" placeholder="Wdh." value="${saved.reps||""}" data-field="reps" />
        `;
        row.querySelectorAll("input").forEach(inp => {
          inp.addEventListener("input", () => {
            const kg = row.querySelector('[data-field=kg]').value;
            const reps = row.querySelector('[data-field=reps]').value;
            saveSet(sk, ex.id, i, { kg, reps }, ex.sets);
            updateProgress();
          });
        });
      }

      setsGrid.appendChild(row);
    }
  });

  updateProgress();
}

function ensureSession(sk) {
  if (!allData[sk]) allData[sk] = {};
}

function saveSet(sk, exId, setIdx, val, totalSets) {
  ensureSession(sk);
  if (!allData[sk][exId]) allData[sk][exId] = { sets: Array(totalSets).fill(null), note: "" };
  allData[sk][exId].sets[setIdx] = val;
  saveData(allData);
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const container = document.getElementById("history-view");
  container.innerHTML = "";

  const sessions = Object.entries(allData)
    .map(([key, data]) => { const [day, date] = key.split("::"); return { key, day, date, data }; })
    .sort((a, b) => b.date.localeCompare(a.date));

  if (sessions.length === 0) {
    container.innerHTML = '<div class="empty-msg">Noch keine Einheiten aufgezeichnet.</div>';
    return;
  }

  sessions.forEach(({ day, date, data }) => {
    const prog = PROGRAMS[day];
    if (!prog) return;
    const total = prog.exercises.reduce((a, e) => a + e.sets, 0);
    const done = prog.exercises.reduce((acc, ex) => {
      const s = (data[ex.id]?.sets || []);
      return acc + s.filter(x => x && (x.reps || x.time || x.kg)).length;
    }, 0);
    const pct = Math.round((done/total)*100);

    const card = document.createElement("div");
    card.className = "history-card";
    card.innerHTML = `
      <div class="history-dot" style="background:${prog.color}"></div>
      <div>
        <div class="history-day">${prog.fullLabel}</div>
        <div class="history-date">${date}</div>
      </div>
      <div class="history-pct" style="color:${prog.color}">${pct}%</div>
    `;
    container.appendChild(card);
  });
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const selector = document.getElementById("ex-selector");
  const emptyMsg = document.getElementById("stats-empty");
  selector.innerHTML = "";
  document.getElementById("chart-box").style.display = "none";
  emptyMsg.textContent = "";

  // Collect exercises that have any data
  const withData = [];
  Object.entries(allData).forEach(([key, sessionData]) => {
    const [day] = key.split("::");
    const prog = PROGRAMS[day];
    if (!prog) return;
    prog.exercises.forEach(ex => {
      const exData = sessionData[ex.id];
      if (!exData?.sets) return;
      if (!exData.sets.some(s => s && (s.reps || s.time || s.kg))) return;
      if (!withData.find(e => e.id === ex.id)) withData.push({ ...ex, day });
    });
  });

  if (withData.length === 0) {
    emptyMsg.textContent = "Noch keine Daten für Statistiken.";
    return;
  }

  withData.forEach(ex => {
    const prog = PROGRAMS[ex.day];
    const btn = document.createElement("button");
    btn.className = "ex-btn" + (selectedExId === ex.id ? " active" : "");
    btn.style.setProperty("--ex-color", prog.color);
    btn.textContent = ex.name;
    btn.addEventListener("click", () => {
      selectedExId = selectedExId === ex.id ? null : ex.id;
      renderStats();
      if (selectedExId) showChart(selectedExId);
    });
    selector.appendChild(btn);
  });

  if (selectedExId) showChart(selectedExId);
}

function showChart(exId) {
  const chartBox = document.getElementById("chart-box");
  const chartTitle = document.getElementById("chart-title");

  // Find exercise definition
  let exDef = null;
  let exColor = "#e8c547";
  for (const day of DAYS) {
    const prog = PROGRAMS[day];
    const found = prog.exercises.find(e => e.id === exId);
    if (found) { exDef = found; exColor = prog.color; break; }
  }
  if (!exDef) return;

  // Collect chart data
  const chartData = [];
  Object.entries(allData).forEach(([key, sessionData]) => {
    const [day, date] = key.split("::");
    const prog = PROGRAMS[day];
    if (!prog) return;
    const ex = prog.exercises.find(e => e.id === exId);
    if (!ex) return;
    const sets = (sessionData[exId]?.sets || []).filter(s => s && (s.reps || s.time || s.kg));
    if (sets.length === 0) return;
    let value;
    if (ex.type === "weighted") value = Math.max(...sets.map(s => parseFloat(s.kg)||0));
    else if (ex.type === "reps") value = Math.max(...sets.map(s => parseFloat(s.reps)||0));
    else value = Math.max(...sets.map(s => parseFloat(s.time)||0));
    chartData.push({ date, value });
  });
  chartData.sort((a, b) => a.date.localeCompare(b.date));

  if (chartData.length === 0) return;

  const unit = exDef.type === "weighted" ? "kg" : exDef.type === "time" ? "s" : "Wdh.";
  chartTitle.textContent = `${exDef.name} – Max ${unit}`;
  chartBox.style.display = "block";

  // Draw chart with canvas
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");
  const W = canvas.offsetWidth;
  canvas.width = W;
  canvas.height = 180;

  const vals = chartData.map(d => d.value);
  const minV = Math.min(...vals) * 0.9;
  const maxV = Math.max(...vals) * 1.1 || 1;
  const pad = { top: 10, right: 10, bottom: 30, left: 30 };
  const plotW = W - pad.left - pad.right;
  const plotH = 180 - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, 180);

  // Grid lines
  ctx.strokeStyle = "#222";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + plotW, y); ctx.stroke();
  }

  // Line
  ctx.strokeStyle = exColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  chartData.forEach((d, i) => {
    const x = pad.left + (i / (chartData.length - 1 || 1)) * plotW;
    const y = pad.top + plotH - ((d.value - minV) / (maxV - minV)) * plotH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  ctx.fillStyle = exColor;
  chartData.forEach((d, i) => {
    const x = pad.left + (i / (chartData.length - 1 || 1)) * plotW;
    const y = pad.top + plotH - ((d.value - minV) / (maxV - minV)) * plotH;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2); ctx.fill();
  });

  // Labels
  ctx.fillStyle = "#555";
  ctx.font = "9px -apple-system, sans-serif";
  ctx.textAlign = "center";
  chartData.forEach((d, i) => {
    if (chartData.length <= 6 || i % Math.ceil(chartData.length/6) === 0) {
      const x = pad.left + (i / (chartData.length - 1 || 1)) * plotW;
      ctx.fillText(d.date.slice(5), x, 180 - 5);
    }
  });

  // Y labels
  ctx.textAlign = "right";
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (plotH / 4) * i;
    const val = maxV - ((maxV - minV) / 4) * i;
    ctx.fillText(Math.round(val), pad.left - 4, y + 3);
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
showTab("home");
</script>
