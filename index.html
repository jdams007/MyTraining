<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Training"/>
  <title>Training · Familie Dams</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:calc(80px + env(safe-area-inset-bottom));}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
    input[type=number]{-moz-appearance:textfield;}

    #profile-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;}
    .profile-title{font-size:11px;letter-spacing:4px;color:#444;margin-bottom:40px;}
    .profile-grid{display:flex;flex-direction:column;gap:12px;width:100%;}
    .profile-card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;}
    .profile-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
    .profile-name{font-size:16px;font-weight:700;color:#ddd;}
    .profile-sub{font-size:11px;color:#444;margin-top:3px;letter-spacing:1px;}
    .profile-arrow{color:#333;font-size:18px;margin-left:auto;}

    #app-header{padding:16px 20px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #151515;}
    #header-left{display:flex;align-items:center;gap:10px;}
    #header-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;}
    #header-name{font-size:13px;font-weight:700;letter-spacing:2px;}
    #switch-btn{background:none;border:none;color:#444;font-size:11px;cursor:pointer;letter-spacing:1px;}

    #tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0d0d0d;border-top:1px solid #151515;display:flex;justify-content:space-around;padding:10px 0 16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));z-index:100;}
    .tab-btn{background:none;border:none;font-size:11px;cursor:pointer;letter-spacing:1px;padding:4px 8px;color:#555;transition:color 0.2s;}
    .tab-btn.active{color:#e8c547;}

    #home-view{padding:20px 16px;}
    .section-label{font-size:10px;color:#444;letter-spacing:3px;margin-bottom:12px;}
    .day-grid{display:flex;flex-direction:column;gap:8px;}
    .day-card{background:#111;border:1px solid #1a1a1a;border-radius:10px;cursor:pointer;display:flex;align-items:stretch;overflow:hidden;text-align:left;padding:0;width:100%;}
    .day-accent{width:4px;flex-shrink:0;}
    .day-card-inner{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;flex:1;}
    .day-card-label{font-size:15px;font-weight:600;color:#ddd;}
    .day-pct{font-size:13px;font-weight:700;}

    #workout-view{padding:16px;display:none;}
    .workout-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .back-btn{background:none;border:none;color:#666;cursor:pointer;font-size:14px;padding:0;}
    .day-title{font-size:16px;font-weight:700;}
    .date-str{font-size:11px;color:#444;margin-top:2px;}
    .progress-badge{font-size:13px;color:#666;}
    .progress-bar{height:2px;background:#1a1a1a;border-radius:2px;margin-bottom:16px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:2px;transition:width 0.3s;}
    .exercise-list{display:flex;flex-direction:column;gap:10px;}
    .ex-card{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:14px;}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .ex-name{font-size:13px;font-weight:600;color:#ccc;flex:1;}
    .sets-tag{font-size:10px;color:#444;letter-spacing:1px;margin-left:8px;}
    .sets-grid{display:flex;flex-direction:column;gap:6px;}
    .set-row{display:flex;align-items:center;gap:8px;}
    .set-label{font-size:11px;color:#444;width:20px;flex-shrink:0;}
    .set-input{background:#0a0a0a;border:1px solid #222;border-radius:6px;color:#fff;font-size:14px;padding:6px 8px;width:70px;outline:none;text-align:center;}
    .set-input.narrow{width:60px;}
    .unit{font-size:11px;color:#444;}
    .note-input{margin-top:10px;background:transparent;border:none;border-top:1px solid #1a1a1a;color:#555;font-size:12px;padding:8px 0 0;width:100%;outline:none;font-family:inherit;}

    #history-view{padding:16px;display:none;flex-direction:column;gap:8px;}
    .history-card{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;}
    .history-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .history-day{font-size:13px;font-weight:600;color:#ccc;}
    .history-date{font-size:11px;color:#444;margin-top:2px;}
    .history-pct{margin-left:auto;font-size:14px;font-weight:700;}

    #stats-view{padding:16px;display:none;}
    .ex-selector{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
    .ex-btn{background:none;border:1px solid #333;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;color:#888;font-family:inherit;}
    .chart-box{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:16px;}
    .chart-title{font-size:12px;color:#888;margin-bottom:12px;}
    .empty-msg{padding:40px;text-align:center;color:#333;font-size:13px;}

    #settings-view{padding:16px;display:none;}
    .settings-section{margin-bottom:28px;}
    .settings-section-title{font-size:10px;color:#444;letter-spacing:3px;margin-bottom:12px;}
    .action-btn{display:flex;align-items:center;justify-content:space-between;background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:14px 16px;width:100%;cursor:pointer;color:#ccc;font-size:14px;font-family:inherit;margin-bottom:8px;text-align:left;}
    .action-btn .arrow{color:#444;font-size:16px;}
    .action-btn.danger{color:#e84747;}
    .day-manage-card{background:#111;border:1px solid #1a1a1a;border-radius:10px;margin-bottom:10px;overflow:hidden;}
    .day-manage-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;}
    .day-manage-label{font-size:14px;font-weight:600;}
    .day-manage-toggle{color:#444;font-size:12px;}
    .day-manage-body{display:none;border-top:1px solid #1a1a1a;padding:12px 16px;}
    .day-manage-body.open{display:block;}
    .ex-manage-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid #151515;}
    .ex-manage-row:last-of-type{border-bottom:none;}
    .ex-manage-name{flex:1;font-size:12px;color:#ccc;}
    .ex-manage-sets{font-size:11px;color:#555;min-width:24px;text-align:center;}
    .ex-manage-type{font-size:10px;color:#333;background:#1a1a1a;border-radius:4px;padding:2px 5px;}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 5px;color:#444;}
    .icon-btn.red{color:#e84747;}
    .icon-btn.green{color:#47e8a0;}

    /* ADD EXERCISE FORM */
    .add-ex-form{margin-top:12px;background:#0a0a0a;border-radius:8px;padding:12px;}
    .form-row{display:flex;gap:8px;margin-bottom:8px;}
    .form-input{background:#111;border:1px solid #222;border-radius:6px;color:#fff;font-size:13px;padding:8px 10px;outline:none;font-family:inherit;flex:1;min-width:0;}
    .form-input.short{flex:0 0 56px;}
    .form-select{background:#111;border:1px solid #222;border-radius:6px;color:#fff;font-size:13px;padding:8px 10px;outline:none;font-family:inherit;flex:1;}
    .add-btn{background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#e8c547;font-size:13px;padding:10px 16px;cursor:pointer;font-family:inherit;width:100%;margin-bottom:8px;}
    .kb-btn{background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#47e8a0;font-size:13px;padding:10px 16px;cursor:pointer;font-family:inherit;width:100%;}

    /* KNOWLEDGE BASE PICKER */
    .kb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:250;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
    .kb-header{padding:16px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .kb-title{font-size:14px;font-weight:700;color:#fff;flex:1;}
    .kb-close{background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:0;}
    .kb-search{flex:1;background:#111;border:1px solid #222;border-radius:8px;color:#fff;font-size:14px;padding:8px 12px;outline:none;font-family:inherit;}
    .kb-body{flex:1;overflow-y:auto;padding:12px 16px;}
    .kb-group{margin-bottom:20px;}
    .kb-group-title{font-size:10px;color:#e8c547;letter-spacing:3px;margin-bottom:8px;}
    .kb-item{padding:10px 12px;background:#111;border:1px solid #1a1a1a;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px;color:#ccc;display:flex;justify-content:space-between;align-items:center;}
    .kb-item:active{background:#1a1a1a;}
    .kb-item-add{color:#444;font-size:16px;}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
    .modal{background:#111;border:1px solid #222;border-radius:14px;padding:24px;width:100%;max-width:340px;}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:8px;}
    .modal-msg{font-size:13px;color:#888;margin-bottom:20px;line-height:1.5;}
    .modal-btns{display:flex;gap:10px;}
    .modal-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:14px;cursor:pointer;font-family:inherit;}
    .modal-btn.cancel{background:#1a1a1a;color:#888;}
    .modal-btn.confirm{background:#e84747;color:#fff;}
    .modal-btn.ok{background:#e8c547;color:#000;font-weight:600;}

    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #333;border-radius:20px;padding:10px 20px;font-size:13px;color:#ccc;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;}
    .color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color 0.15s;}
    .color-swatch.selected{border-color:#fff;}
    .pe-day-row{display:flex;align-items:center;gap:8px;background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:10px 12px;}
    .pe-day-input{flex:1;background:transparent;border:none;color:#ccc;font-size:13px;outline:none;font-family:inherit;}
    .pe-day-del{background:none;border:none;color:#444;font-size:16px;cursor:pointer;padding:0 2px;}
  </style>
</head>
<body>

<div id="profile-screen">
  <div class="profile-title">FAMILIE DAMS · TRAINING</div>
  <div class="profile-grid" id="profile-grid"></div>
  <button id="manage-profiles-btn" style="margin-top:24px;background:none;border:1px solid #1a1a1a;border-radius:10px;color:#444;font-size:12px;padding:10px 24px;cursor:pointer;font-family:inherit;letter-spacing:2px;">+ PROFIL HINZUFÜGEN</button>
</div>

<!-- PROFILE EDITOR OVERLAY -->
<div id="profile-editor" style="display:none;position:fixed;inset:0;background:#0a0a0a;z-index:300;overflow-y:auto;max-width:480px;margin:0 auto;">
  <div style="padding:20px 20px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #151515;">
    <button id="pe-close" style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:0;">✕</button>
    <span id="pe-title" style="font-size:14px;font-weight:700;letter-spacing:2px;"></span>
  </div>
  <div style="padding:20px 16px;">
    <!-- Name -->
    <div style="font-size:10px;color:#444;letter-spacing:3px;margin-bottom:8px;">NAME</div>
    <input id="pe-name" class="form-input" style="width:100%;margin-bottom:20px;" placeholder="z.B. Max" maxlength="20"/>

    <!-- Color -->
    <div style="font-size:10px;color:#444;letter-spacing:3px;margin-bottom:12px;">FARBE</div>
    <div id="pe-colors" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;"></div>

    <!-- Days -->
    <div style="font-size:10px;color:#444;letter-spacing:3px;margin-bottom:12px;">TRAININGSTAGE</div>
    <div id="pe-days" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;"></div>
    <button id="pe-add-day" style="background:#111;border:1px dashed #333;border-radius:8px;color:#555;font-size:13px;padding:10px;width:100%;cursor:pointer;font-family:inherit;">+ Tag hinzufügen</button>

    <!-- Save / Delete -->
    <button id="pe-save" style="margin-top:24px;background:#e8c547;border:none;border-radius:10px;color:#000;font-size:14px;font-weight:700;padding:14px;width:100%;cursor:pointer;font-family:inherit;">Speichern</button>
    <button id="pe-delete" style="margin-top:10px;background:none;border:1px solid #e84747;border-radius:10px;color:#e84747;font-size:13px;padding:12px;width:100%;cursor:pointer;font-family:inherit;display:none;">Profil löschen</button>
  </div>
</div>

<div id="main-app" style="display:none">
  <div id="app-header">
    <div id="header-left">
      <div id="header-avatar"></div>
      <span id="header-name"></span>
    </div>
    <button id="switch-btn">PROFIL WECHSELN</button>
  </div>

  <div id="home-view">
    <div class="section-label">PROGRAMM</div>
    <div class="day-grid" id="day-grid"></div>
  </div>

  <div id="workout-view">
    <div class="workout-header">
      <button class="back-btn" id="back-btn">← Zurück</button>
      <div>
        <div class="day-title" id="workout-title"></div>
        <div class="date-str" id="workout-date"></div>
      </div>
      <div class="progress-badge" id="progress-badge"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="exercise-list" id="exercise-list"></div>
  </div>

  <div id="history-view"></div>

  <div id="stats-view">
    <div class="section-label">FORTSCHRITT</div>
    <div class="ex-selector" id="ex-selector"></div>
    <div class="chart-box" id="chart-box" style="display:none">
      <div class="chart-title" id="chart-title"></div>
      <canvas id="chart" height="180"></canvas>
    </div>
    <div class="empty-msg" id="stats-empty"></div>
  </div>

  <div id="settings-view">
    <div class="settings-section">
      <div class="settings-section-title">BACKUP</div>
      <button class="action-btn" id="export-btn"><span>📤 Daten exportieren</span><span class="arrow">›</span></button>
      <button class="action-btn" id="import-trigger"><span>📥 Daten importieren</span><span class="arrow">›</span></button>
      <input type="file" id="import-input" accept=".json" style="display:none"/>
      <button class="action-btn danger" id="reset-btn"><span>🗑 Meine Trainingsdaten löschen</span><span class="arrow">›</span></button>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">PROGRAMM VERWALTEN</div>
      <div id="program-manager"></div>
    </div>
  </div>

  <div id="tab-bar">
    <button class="tab-btn active" data-tab="home">Training</button>
    <button class="tab-btn" data-tab="history">Verlauf</button>
    <button class="tab-btn" data-tab="stats">Statistik</button>
    <button class="tab-btn" data-tab="settings">Einstellungen</button>
  </div>
</div>

<!-- KNOWLEDGE BASE PICKER -->
<div class="kb-overlay" id="kb-overlay" style="display:none">
  <div class="kb-header">
    <button class="kb-close" id="kb-close">✕</button>
    <span class="kb-title">Übung aus Datenbank</span>
    <input class="kb-search" id="kb-search" placeholder="Suchen..." type="search"/>
  </div>
  <div class="kb-body" id="kb-body"></div>
</div>

<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

const LOG_KEY=pid=>`training_log_${pid}`;
const PROG_KEY=pid=>`training_prog_${pid}`;
const META_KEY="training_profiles_meta";
const PALETTE=["#e8c547","#e87c47","#e84747","#e847a0","#a047e8","#47a0e8","#47e8c5","#47e8a0","#ffffff","#888888"];

let activeProfile=null,allData={},programs={},currentDay=null,selectedExId=null;
let kbCallback=null;
let profilesMeta={}; // { pid: { name, color, days:[{id,label}] } }

function loadMeta(){
  try{
    const s=localStorage.getItem(META_KEY);
    if(s){ profilesMeta=JSON.parse(s); return; }
  }catch{}
  // First run: seed from PROFILE_DEFAULTS
  profilesMeta={};
  ["jan","heike","hannes"].forEach(pid=>{
    const def=PROFILE_DEFAULTS[pid];
    profilesMeta[pid]={
      name:def.name, color:def.color,
      days:def.days.map(d=>({id:d, label:def.programs[d].label}))
    };
  });
  saveMeta();
}
function saveMeta(){try{localStorage.setItem(META_KEY,JSON.stringify(profilesMeta));}catch{}}
function getProfileIds(){return Object.keys(profilesMeta);}

function loadProfile(pid){
  try{allData=JSON.parse(localStorage.getItem(LOG_KEY(pid))||"{}");}catch{allData={};}
  try{
    const s=localStorage.getItem(PROG_KEY(pid));
    if(s){programs=JSON.parse(s);}
    else if(PROFILE_DEFAULTS[pid]){programs=JSON.parse(JSON.stringify(PROFILE_DEFAULTS[pid].programs));}
    else{
      // New custom profile – build empty programs from meta days
      programs={};
      (profilesMeta[pid]?.days||[]).forEach(d=>{
        programs[d.id]={label:d.label,fullLabel:d.label,color:profilesMeta[pid].color,exercises:[]};
      });
    }
  }catch{programs={};}
}
function saveLog(){try{localStorage.setItem(LOG_KEY(activeProfile),JSON.stringify(allData));}catch{}}
function savePrograms(){try{localStorage.setItem(PROG_KEY(activeProfile),JSON.stringify(programs));}catch{}}
function todayStr(){return new Date().toISOString().split("T")[0];}
function sk(day){return `${day}::${todayStr()}`;}
function uid(){return Math.random().toString(36).slice(2,9);}

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}

function showModal({title,msg,buttons}){
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-msg").textContent=msg;
  const btns=document.getElementById("modal-btns");btns.innerHTML="";
  buttons.forEach(b=>{const btn=document.createElement("button");btn.className=`modal-btn ${b.cls||"ok"}`;btn.textContent=b.label;btn.addEventListener("click",()=>{hideModal();b.action&&b.action();});btns.appendChild(btn);});
  document.getElementById("modal").style.display="flex";
}
function hideModal(){document.getElementById("modal").style.display="none";}
document.getElementById("modal").addEventListener("click",e=>{if(e.target===document.getElementById("modal"))hideModal();});

// ── KNOWLEDGE BASE PICKER ────────────────────────
function openKnowledgeBase(callback){
  kbCallback=callback;
  document.getElementById("kb-search").value="";
  renderKB("");
  document.getElementById("kb-overlay").style.display="flex";
}
function closeKB(){document.getElementById("kb-overlay").style.display="none";kbCallback=null;}
document.getElementById("kb-close").addEventListener("click",closeKB);
document.getElementById("kb-search").addEventListener("input",e=>renderKB(e.target.value.toLowerCase()));

function renderKB(query){
  const body=document.getElementById("kb-body");body.innerHTML="";
  Object.entries(KNOWLEDGE_BASE).forEach(([group,exercises])=>{
    const filtered=query?exercises.filter(e=>e.toLowerCase().includes(query)||group.toLowerCase().includes(query)):exercises;
    if(!filtered.length)return;
    const div=document.createElement("div");div.className="kb-group";
    div.innerHTML=`<div class="kb-group-title">${group.toUpperCase()}</div>`;
    filtered.forEach(ex=>{
      const item=document.createElement("div");item.className="kb-item";
      item.innerHTML=`<span>${ex}</span><span class="kb-item-add">＋</span>`;
      item.addEventListener("click",()=>{
        if(kbCallback)kbCallback(ex);
        closeKB();
        showToast(`✓ "${ex}" übernommen`);
      });
      div.appendChild(item);
    });
    body.appendChild(div);
  });
}

function showProfileScreen(){
  document.getElementById("profile-screen").style.display="flex";
  document.getElementById("main-app").style.display="none";
  document.getElementById("profile-editor").style.display="none";
  const grid=document.getElementById("profile-grid");grid.innerHTML="";
  getProfileIds().forEach(pid=>{
    const meta=profilesMeta[pid];
    const days=meta.days||[];
    const card=document.createElement("div");card.className="profile-card";card.style.position="relative";
    card.innerHTML=`
      <div class="profile-avatar" style="background:${meta.color}22;color:${meta.color}">${meta.name[0].toUpperCase()}</div>
      <div class="profile-info">
        <div class="profile-name">${meta.name}</div>
        <div class="profile-sub">${days.length} TRAININGSTAGE</div>
      </div>
      <button class="icon-btn" data-edit="${pid}" style="color:#333;font-size:14px;padding:4px 8px;">✏️</button>
      <div class="profile-arrow">›</div>`;
    card.addEventListener("click",e=>{
      if(e.target.closest('[data-edit]'))return;
      selectProfile(pid);
    });
    card.querySelector('[data-edit]').addEventListener("click",e=>{e.stopPropagation();openProfileEditor(pid);});
    grid.appendChild(card);
  });
}

document.getElementById("manage-profiles-btn").addEventListener("click",()=>openProfileEditor(null));

function openProfileEditor(pid){
  const isNew=!pid;
  const meta=pid?profilesMeta[pid]:{name:"",color:PALETTE[0],days:[]};
  document.getElementById("pe-title").textContent=isNew?"NEUES PROFIL":"PROFIL BEARBEITEN";
  document.getElementById("pe-name").value=meta.name;
  document.getElementById("pe-delete").style.display=isNew?"none":"block";
  document.getElementById("pe-delete").dataset.pid=pid||"";

  // Colors
  const colorBox=document.getElementById("pe-colors");colorBox.innerHTML="";
  PALETTE.forEach(c=>{
    const sw=document.createElement("div");sw.className="color-swatch"+(meta.color===c?" selected":"");
    sw.style.background=c;sw.dataset.color=c;
    sw.addEventListener("click",()=>{colorBox.querySelectorAll(".color-swatch").forEach(s=>s.classList.remove("selected"));sw.classList.add("selected");});
    colorBox.appendChild(sw);
  });

  // Days
  const daysBox=document.getElementById("pe-days");daysBox.innerHTML="";
  (meta.days||[]).forEach(d=>addDayRow(daysBox,d.label));

  document.getElementById("pe-add-day").onclick=()=>addDayRow(daysBox,"");
  document.getElementById("pe-save").dataset.pid=pid||"";
  document.getElementById("profile-editor").style.display="block";
  document.getElementById("profile-screen").style.display="none";
}

function addDayRow(container,label){
  const row=document.createElement("div");row.className="pe-day-row";
  row.innerHTML=`<span style="font-size:11px;color:#444;width:20px;flex-shrink:0">${container.children.length+1}.</span><input class="pe-day-input" placeholder="z.B. Push" value="${label}"/><button class="pe-day-del">✕</button>`;
  row.querySelector(".pe-day-del").addEventListener("click",()=>{row.remove();reindexDays(container);});
  container.appendChild(row);
}
function reindexDays(container){Array.from(container.children).forEach((r,i)=>{const sp=r.querySelector("span");if(sp)sp.textContent=`${i+1}.`;});}

document.getElementById("pe-close").addEventListener("click",()=>{document.getElementById("profile-editor").style.display="none";showProfileScreen();});

document.getElementById("pe-save").addEventListener("click",()=>{
  const pid=document.getElementById("pe-save").dataset.pid||uid();
  const name=document.getElementById("pe-name").value.trim();
  if(!name){showToast("❌ Bitte Namen eingeben");return;}
  const color=document.querySelector("#pe-colors .color-swatch.selected")?.dataset.color||PALETTE[0];
  const dayInputs=Array.from(document.getElementById("pe-days").querySelectorAll(".pe-day-input"));
  const days=dayInputs.map(i=>i.value.trim()).filter(Boolean).map((label,idx)=>{
    // Try to reuse existing day id if editing
    const existing=profilesMeta[pid]?.days?.[idx];
    return {id:existing?.id||uid(), label};
  });
  if(!days.length){showToast("❌ Mindestens ein Tag nötig");return;}

  const isNew=!profilesMeta[pid];
  profilesMeta[pid]={name,color,days};
  saveMeta();

  // If editing existing profile, sync program labels/colors
  if(!isNew){
    try{
      const s=localStorage.getItem(PROG_KEY(pid));
      if(s){
        const progs=JSON.parse(s);
        days.forEach(d=>{if(progs[d.id]){progs[d.id].label=d.label;progs[d.id].color=color;}});
        localStorage.setItem(PROG_KEY(pid),JSON.stringify(progs));
      }
    }catch{}
  } else {
    // New profile: create empty programs
    const progs={};
    days.forEach(d=>{progs[d.id]={label:d.label,fullLabel:d.label,color,exercises:[]};});
    localStorage.setItem(PROG_KEY(pid),JSON.stringify(progs));
  }

  document.getElementById("profile-editor").style.display="none";
  showProfileScreen();
  showToast(`✓ ${name} gespeichert`);
});

document.getElementById("pe-delete").addEventListener("click",()=>{
  const pid=document.getElementById("pe-delete").dataset.pid;
  const name=profilesMeta[pid]?.name||"Profil";
  showModal({title:"Profil löschen",msg:`"${name}" und alle Trainingsdaten unwiderruflich löschen?`,buttons:[
    {label:"Abbrechen",cls:"cancel"},
    {label:"Löschen",cls:"confirm",action:()=>{
      delete profilesMeta[pid];
      saveMeta();
      try{localStorage.removeItem(LOG_KEY(pid));localStorage.removeItem(PROG_KEY(pid));}catch{}
      document.getElementById("profile-editor").style.display="none";
      showProfileScreen();
      showToast(`✓ ${name} gelöscht`);
    }}
  ]});
});

document.getElementById("switch-btn").addEventListener("click",()=>{activeProfile=null;selectedExId=null;showProfileScreen();});

// ── TABS ─────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>showTab(btn.dataset.tab)));
function showTab(tab){
  currentDay=null;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  ["home","history","stats","settings"].forEach(v=>document.getElementById(v+"-view").style.display="none");
  document.getElementById("workout-view").style.display="none";
  document.getElementById(tab+"-view").style.display=tab==="history"?"flex":"block";
  if(tab==="home")renderHome();
  if(tab==="history")renderHistory();
  if(tab==="stats")renderStats();
  if(tab==="settings")renderSettings();

// ── HOME ─────────────────────────────────────────
function renderHome(){
  const grid=document.getElementById("day-grid");grid.innerHTML="";
  const meta=profilesMeta[activeProfile];
  (meta?.days||[]).forEach(d=>{
    const prog=programs[d.id];if(!prog)return;
    const session=allData[sk(d.id)]||{};
    const total=prog.exercises.reduce((a,e)=>a+e.sets,0);
    const done=prog.exercises.reduce((acc,ex)=>acc+(session[ex.id]?.sets||[]).filter(x=>x&&(x.reps||x.time||x.kg)).length,0);
    const btn=document.createElement("button");btn.className="day-card";
    btn.innerHTML=`<div class="day-accent" style="background:${prog.color}"></div><div class="day-card-inner"><div class="day-card-label">${prog.label}</div>${done>0?`<div class="day-pct" style="color:${prog.color}">${Math.round((done/total)*100)}%</div>`:""}</div>`;
    btn.addEventListener("click",()=>openWorkout(d.id));grid.appendChild(btn);
  });
}

// ── WORKOUT ──────────────────────────────────────
function openWorkout(day){
  currentDay=day;
  ["home","history","stats","settings"].forEach(v=>document.getElementById(v+"-view").style.display="none");
  document.getElementById("workout-view").style.display="block";
  renderWorkout();
}
document.getElementById("back-btn").addEventListener("click",()=>showTab("home"));

function renderWorkout(){
  const day=currentDay,prog=programs[day],key=sk(day);
  document.getElementById("workout-title").textContent=prog.fullLabel;
  document.getElementById("workout-title").style.color=prog.color;
  document.getElementById("workout-date").textContent=todayStr();
  const total=prog.exercises.reduce((a,e)=>a+e.sets,0);
  function updateProgress(){
    const s=allData[key]||{};
    const done=prog.exercises.reduce((acc,ex)=>acc+(s[ex.id]?.sets||[]).filter(x=>x&&(x.reps||x.time||x.kg)).length,0);
    document.getElementById("progress-badge").innerHTML=`<span style="color:${prog.color}">${done}</span>/${total}`;
    document.getElementById("progress-fill").style.cssText=`width:${(done/total)*100}%;background:${prog.color}`;
  }
  const list=document.getElementById("exercise-list");list.innerHTML="";
  prog.exercises.forEach(ex=>{
    const exData=(allData[key]||{})[ex.id]||{};
    const card=document.createElement("div");card.className="ex-card";
    card.innerHTML=`<div class="card-header"><span class="ex-name">${ex.name}</span><span class="sets-tag">${ex.sets} SÄTZE</span></div><div class="sets-grid" id="sg-${ex.id}"></div><input class="note-input" placeholder="Notiz..." value="${(exData.note||'').replace(/"/g,'&quot;')}"/>`;
    list.appendChild(card);
    card.querySelector(".note-input").addEventListener("input",e=>{
      if(!allData[key])allData[key]={};
      if(!allData[key][ex.id])allData[key][ex.id]={sets:Array(ex.sets).fill(null),note:""};
      allData[key][ex.id].note=e.target.value;saveLog();
    });
    const sg=card.querySelector(`#sg-${ex.id}`);
    for(let i=0;i<ex.sets;i++){
      const row=document.createElement("div");row.className="set-row";
      const saved=exData.sets?.[i]||{};
      if(ex.type==="reps"){
        row.innerHTML=`<span class="set-label">S${i+1}</span><input class="set-input" type="number" inputmode="numeric" placeholder="Wdh." value="${saved.reps||''}"/>`;
        row.querySelector("input").addEventListener("input",e=>{saveSet(key,ex.id,i,{reps:e.target.value},ex.sets);updateProgress();});
      }else if(ex.type==="time"){
        row.innerHTML=`<span class="set-label">S${i+1}</span><input class="set-input" type="number" inputmode="numeric" placeholder="Sek." value="${saved.time||''}"/><span class="unit">s</span>`;
        row.querySelector("input").addEventListener("input",e=>{saveSet(key,ex.id,i,{time:e.target.value},ex.sets);updateProgress();});
      }else{
        row.innerHTML=`<span class="set-label">S${i+1}</span><input class="set-input narrow" type="number" inputmode="decimal" placeholder="kg" value="${saved.kg||''}" data-f="kg"/><span class="unit">kg</span><input class="set-input narrow" type="number" inputmode="numeric" placeholder="Wdh." value="${saved.reps||''}" data-f="reps"/>`;
        row.querySelectorAll("input").forEach(inp=>inp.addEventListener("input",()=>{saveSet(key,ex.id,i,{kg:row.querySelector('[data-f=kg]').value,reps:row.querySelector('[data-f=reps]').value},ex.sets);updateProgress();}));
      }
      sg.appendChild(row);
    }
  });
  updateProgress();
}
function saveSet(key,exId,idx,val,total){
  if(!allData[key])allData[key]={};
  if(!allData[key][exId])allData[key][exId]={sets:Array(total).fill(null),note:""};
  allData[key][exId].sets[idx]=val;saveLog();
}

// ── HISTORY ──────────────────────────────────────
function renderHistory(){
  const c=document.getElementById("history-view");c.innerHTML="";
  const sessions=Object.entries(allData).map(([k,d])=>{const[day,date]=k.split("::");return{key:k,day,date,data:d};}).sort((a,b)=>b.date.localeCompare(a.date));
  if(!sessions.length){c.innerHTML='<div class="empty-msg">Noch keine Einheiten.</div>';return;}
  sessions.forEach(({day,date,data})=>{
    const prog=programs[day];if(!prog)return;
    const total=prog.exercises.reduce((a,e)=>a+e.sets,0);
    const done=prog.exercises.reduce((acc,ex)=>acc+(data[ex.id]?.sets||[]).filter(x=>x&&(x.reps||x.time||x.kg)).length,0);
    const card=document.createElement("div");card.className="history-card";
    card.innerHTML=`<div class="history-dot" style="background:${prog.color}"></div><div><div class="history-day">${prog.fullLabel}</div><div class="history-date">${date}</div></div><div class="history-pct" style="color:${prog.color}">${Math.round((done/total)*100)}%</div>`;
    c.appendChild(card);
  });
}

// ── STATS ────────────────────────────────────────
function renderStats(){
  const sel=document.getElementById("ex-selector"),em=document.getElementById("stats-empty");
  sel.innerHTML="";document.getElementById("chart-box").style.display="none";em.textContent="";
  const withData=[];
  const days=(profilesMeta[activeProfile]?.days||[]).map(d=>d.id);
  Object.entries(allData).forEach(([k,sd])=>{
    const[day]=k.split("::");const prog=programs[day];if(!prog)return;
    prog.exercises.forEach(ex=>{
      if(!sd[ex.id]?.sets?.some(s=>s&&(s.reps||s.time||s.kg)))return;
      if(!withData.find(e=>e.id===ex.id))withData.push({...ex,day});
    });
  });
  if(!withData.length){em.textContent="Noch keine Daten für Statistiken.";return;}
  withData.forEach(ex=>{
    const prog=programs[ex.day];
    const btn=document.createElement("button");btn.className="ex-btn";
    if(selectedExId===ex.id){btn.style.color=prog.color;btn.style.borderColor=prog.color;}
    btn.textContent=ex.name;
    btn.addEventListener("click",()=>{selectedExId=selectedExId===ex.id?null:ex.id;renderStats();if(selectedExId)showChart(selectedExId);});
    sel.appendChild(btn);
  });
  if(selectedExId)showChart(selectedExId);
}
function showChart(exId){
  let exDef=null,exColor="#e8c547";
  const days=(profilesMeta[activeProfile]?.days||[]).map(d=>d.id);
  for(const day of days){const f=programs[day]?.exercises.find(e=>e.id===exId);if(f){exDef=f;exColor=programs[day].color;break;}}
  if(!exDef)return;
  const cd=[];
  Object.entries(allData).forEach(([k,sd])=>{
    const[day,date]=k.split("::");const prog=programs[day];if(!prog)return;
    const ex=prog.exercises.find(e=>e.id===exId);if(!ex)return;
    const sets=(sd[exId]?.sets||[]).filter(s=>s&&(s.reps||s.time||s.kg));if(!sets.length)return;
    let v;
    if(ex.type==="weighted")v=Math.max(...sets.map(s=>parseFloat(s.kg)||0));
    else if(ex.type==="reps")v=Math.max(...sets.map(s=>parseFloat(s.reps)||0));
    else v=Math.max(...sets.map(s=>parseFloat(s.time)||0));
    cd.push({date,value:v});
  });
  cd.sort((a,b)=>a.date.localeCompare(b.date));if(!cd.length)return;
  const unit=exDef.type==="weighted"?"kg":exDef.type==="time"?"s":"Wdh.";
  document.getElementById("chart-title").textContent=`${exDef.name} – Max ${unit}`;
  document.getElementById("chart-box").style.display="block";
  const canvas=document.getElementById("chart"),ctx=canvas.getContext("2d");
  const W=canvas.offsetWidth;canvas.width=W;canvas.height=180;
  const vals=cd.map(d=>d.value),minV=Math.min(...vals)*0.9,maxV=Math.max(...vals)*1.1||1;
  const pad={top:10,right:10,bottom:30,left:32},pW=W-pad.left-pad.right,pH=180-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,180);
  ctx.strokeStyle="#222";ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.top+(pH/4)*i;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+pW,y);ctx.stroke();}
  ctx.strokeStyle=exColor;ctx.lineWidth=2;ctx.beginPath();
  cd.forEach((d,i)=>{const x=pad.left+(i/(cd.length-1||1))*pW,y=pad.top+pH-((d.value-minV)/(maxV-minV))*pH;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  ctx.fillStyle=exColor;
  cd.forEach((d,i)=>{const x=pad.left+(i/(cd.length-1||1))*pW,y=pad.top+pH-((d.value-minV)/(maxV-minV))*pH;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle="#555";ctx.font="9px -apple-system,sans-serif";ctx.textAlign="center";
  cd.forEach((d,i)=>{if(cd.length<=6||i%Math.ceil(cd.length/6)===0){const x=pad.left+(i/(cd.length-1||1))*pW;ctx.fillText(d.date.slice(5),x,175);}});
  ctx.textAlign="right";
  for(let i=0;i<=4;i++){const y=pad.top+(pH/4)*i;ctx.fillText(Math.round(maxV-((maxV-minV)/4)*i),pad.left-4,y+3);}
}

// ── SETTINGS ─────────────────────────────────────
function renderSettings(){renderProgramManager();}
document.getElementById("export-btn").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify({profile:activeProfile,log:allData,programs,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`training-${activeProfile}-${todayStr()}.json`;a.click();
  showToast("✓ Backup exportiert");
});
document.getElementById("import-trigger").addEventListener("click",()=>document.getElementById("import-input").click());
document.getElementById("import-input").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      showModal({title:"Daten importieren",msg:`Backup von ${p.profile||"?"} vom ${p.exportedAt?.slice(0,10)||"?"} laden?`,buttons:[
        {label:"Abbrechen",cls:"cancel"},
        {label:"Importieren",cls:"ok",action:()=>{if(p.log){allData=p.log;saveLog();}if(p.programs){programs=p.programs;savePrograms();}showToast("✓ Importiert");showTab("home");}}
      ]});
    }catch{showToast("❌ Ungültige Datei");}
  };
  reader.readAsText(file);e.target.value="";
});
document.getElementById("reset-btn").addEventListener("click",()=>{
  showModal({title:"Daten löschen",msg:"Wirklich alle eigenen Trainingsdaten löschen?",buttons:[
    {label:"Abbrechen",cls:"cancel"},
    {label:"Löschen",cls:"confirm",action:()=>{allData={};saveLog();showToast("✓ Gelöscht");showTab("home");}}
  ]});
});

function renderProgramManager(){
  const container=document.getElementById("program-manager");container.innerHTML="";
  const meta=profilesMeta[activeProfile];
  (meta?.days||[]).forEach(d=>{
    const prog=programs[d.id];if(!prog)return;
    const card=document.createElement("div");card.className="day-manage-card";
    const header=document.createElement("div");header.className="day-manage-header";
    header.innerHTML=`<span class="day-manage-label" style="color:${prog.color}">${prog.fullLabel||prog.label}</span><span class="day-manage-toggle">▼</span>`;
    const body=document.createElement("div");body.className="day-manage-body";
    card.appendChild(header);card.appendChild(body);
    header.addEventListener("click",()=>{
      body.classList.toggle("open");
      header.querySelector(".day-manage-toggle").textContent=body.classList.contains("open")?"▲":"▼";
      if(body.classList.contains("open"))renderDayBody(d.id,body);
    });
    container.appendChild(card);
  });
}

function renderDayBody(day,body){
  const prog=programs[day];body.innerHTML="";
  prog.exercises.forEach((ex,idx)=>{
    const row=document.createElement("div");row.className="ex-manage-row";
    const tl=ex.type==="weighted"?"kg+Wdh":ex.type==="time"?"Zeit":"Wdh";
    row.innerHTML=`<span class="ex-manage-name">${ex.name}</span><span class="ex-manage-sets">${ex.sets}×</span><span class="ex-manage-type">${tl}</span><button class="icon-btn" data-a="minus" data-i="${idx}">－</button><button class="icon-btn green" data-a="plus" data-i="${idx}">＋</button><button class="icon-btn red" data-a="del" data-i="${idx}">✕</button>`;
    row.querySelectorAll("[data-a]").forEach(btn=>btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.i),a=btn.dataset.a;
      if(a==="plus"){programs[day].exercises[i].sets=Math.min(20,programs[day].exercises[i].sets+1);savePrograms();renderDayBody(day,body);}
      else if(a==="minus"){programs[day].exercises[i].sets=Math.max(1,programs[day].exercises[i].sets-1);savePrograms();renderDayBody(day,body);}
      else if(a==="del"){
        const n=programs[day].exercises[i].name;
        showModal({title:"Übung löschen",msg:`"${n}" entfernen?`,buttons:[
          {label:"Abbrechen",cls:"cancel"},
          {label:"Löschen",cls:"confirm",action:()=>{programs[day].exercises.splice(i,1);savePrograms();renderDayBody(day,body);showToast(`✓ ${n} entfernt`);}}
        ]});
      }
    }));
    body.appendChild(row);
  });

  // Add form
  const form=document.createElement("div");form.className="add-ex-form";
  const fid=`f-${day}`;
  form.innerHTML=`
    <div class="form-row"><input class="form-input" id="${fid}-name" placeholder="Übungsname (oder aus Datenbank wählen)"/></div>
    <div class="form-row">
      <input class="form-input short" id="${fid}-sets" type="number" value="3" inputmode="numeric" placeholder="Sätze"/>
      <select class="form-select" id="${fid}-type">
        <option value="reps">Wiederholungen</option>
        <option value="weighted">Gewicht + Wdh.</option>
        <option value="time">Zeit (Sek.)</option>
      </select>
    </div>
    <button class="kb-btn" id="${fid}-kb">📚 Aus Datenbank wählen</button>
    <button class="add-btn" style="margin-top:8px" id="${fid}-add">+ Manuell hinzufügen</button>
  `;
  body.appendChild(form);

  document.getElementById(`${fid}-kb`).addEventListener("click",()=>{
    openKnowledgeBase(name=>{
      document.getElementById(`${fid}-name`).value=name;
      // Auto-detect type based on name
      const lower=name.toLowerCase();
      const sel=document.getElementById(`${fid}-type`);
      if(lower.includes("hold")||lower.includes("planche")||lower.includes("handstand"))sel.value="time";
      else if(lower.includes("liegestütz")||lower.includes("klimmzug")||lower.includes("situp"))sel.value="reps";
      else sel.value="weighted";
    });
  });

  document.getElementById(`${fid}-add`).addEventListener("click",()=>{
    const name=document.getElementById(`${fid}-name`).value.trim();
    const sets=parseInt(document.getElementById(`${fid}-sets`).value)||3;
    const type=document.getElementById(`${fid}-type`).value;
    if(!name){showToast("❌ Bitte Namen eingeben");return;}
    programs[day].exercises.push({id:uid(),name,sets,type});
    savePrograms();renderDayBody(day,body);showToast(`✓ ${name} hinzugefügt`);
  });
}

// ── INIT ─────────────────────────────────────────
loadMeta();
showProfileScreen();
